<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Σenario</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;700&family=DM+Mono:wght@300;400&family=Space+Grotesk:wght@500&family=Inter:wght@400&display=swap" rel="stylesheet">

  <style>
    :root {
      --white:   #ffffff;
      --black:   #0d0d0d;
      --orange:  #C4622D;
      --gray:    #9A9A9A;
      --border:  #e8e8e4;
      --ff-display:   'Bebas Neue', sans-serif;
      --ff-condensed: 'Barlow Condensed', sans-serif;
      --ff-mono:      'DM Mono', monospace;
      --ff-heading:   'Space Grotesk', sans-serif;
      --ff-body:      'Suisse Intl', 'Inter', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    h1, h2, h3, h4, h5, h6 { font-family: var(--ff-heading); font-weight: 500; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--ff-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─────────────────────────────────── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--black);
      padding: 0 40px 10px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
    }
    .site-header__nav { display: flex; gap: 28px; padding-top: 22px; }
    .site-header__nav a {
      font-family: var(--ff-heading); font-weight: 500; font-size: 13px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--white); transition: color 0.2s;
    }
    .site-header__nav a:hover { color: var(--orange); }
    .site-header__actions {
      display: flex; align-items: center; gap: 18px;
      justify-content: flex-end; padding-top: 22px;
    }
    .site-header__actions a {
      font-family: var(--ff-heading); font-weight: 500; font-size: 13px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--white); transition: color 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .site-header__actions a:hover { color: var(--orange); }

    .cart-link { position: relative; }
    .cart-badge {
      position: absolute; top: -8px; right: -10px;
      min-width: 16px; height: 16px; padding: 0 4px;
      border-radius: 8px; background: var(--orange); color: var(--white);
      font-family: var(--ff-body); font-size: 9px; line-height: 16px;
      text-align: center; display: none; align-items: center; justify-content: center;
    }
    .site-header__logo { width: 260px; height: auto; justify-self: center; margin-top: -18px; filter: invert(1); }

    /* ─── ERROR BODY ─────────────────────────────── */
    .error-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
      gap: 0;
    }

    .error-code {
      font-family: var(--ff-display);
      font-size: clamp(120px, 20vw, 240px);
      line-height: 0.85;
      letter-spacing: 0.04em;
      color: var(--orange);
      opacity: 0;
      transform: translateY(20px);
    }

    .error-label {
      font-family: var(--ff-body);
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gray);
      margin-top: 24px;
      margin-bottom: 16px;
      opacity: 0;
    }

    .error-msg {
      font-family: var(--ff-display);
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: 0.04em;
      line-height: 1.1;
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(10px);
    }

    .error-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
    }

    .error-link {
      font-family: var(--ff-body);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px 32px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .error-link:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    .error-link--primary {
      background: var(--orange);
      border-color: var(--orange);
      color: var(--white);
    }

    .error-link--primary:hover {
      background: transparent;
      color: var(--orange);
    }

    /* ─── FOOTER ─────────────────────────────────── */
    .site-footer {
      padding: 40px 24px 32px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .footer__legal {
      font-family: var(--ff-body); font-size: 8px; letter-spacing: 0.18em;
      color: rgba(255,255,255,0.2); text-transform: uppercase;
    }

    /* ─── ACCOUNT MENU ───────────────────────────── */
    .account-menu { position: relative; display: flex; align-items: center; }
    .account-menu__trigger {
      background: none; border: none; cursor: pointer;
      color: var(--white); display: flex; align-items: center;
      padding: 0; transition: color 0.2s;
    }
    .account-menu__trigger:hover { color: var(--orange); }
    .account-menu__dropdown {
      position: absolute; top: calc(100% + 10px); right: 0;
      background: var(--black); border: 1px solid rgba(255,255,255,0.12);
      min-width: 190px; z-index: 200;
      display: none; flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .account-menu__dropdown.open { display: flex; }
    .account-menu__dropdown a,
    .account-menu__dropdown button {
      font-family: var(--ff-body); font-size: 9px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--white);
      padding: 13px 16px; border: none; background: none;
      text-align: left; cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-decoration: none; display: block; width: 100%;
    }
    .account-menu__dropdown button:last-child { border-bottom: none; }
    .account-menu__dropdown a:hover,
    .account-menu__dropdown button:hover { background: rgba(255,255,255,0.08); color: var(--white); }
    .account-menu__dropdown .logout-btn { color: var(--gray); }
    .account-menu__dropdown .logout-btn:hover { color: var(--orange); background: rgba(255,255,255,0.05); }

    @media (max-width: 640px) {
      .site-header {
        padding: 16px;
        grid-template-columns: auto 1fr auto;
      }
      .site-header__nav { display: none; }
      .site-header__logo { width: 160px; margin-top: 0; justify-self: start; }
      .site-header__actions { padding-top: 0; gap: 14px; }
      .site-header__actions a span { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <nav class="site-header__nav">
      <a href="collection.html">Collection</a>
      <a href="index.html">Moodboard</a>
      <a href="concept.html">Concept</a>
    </nav>
    <a href="index.html">
      <img class="site-header__logo" src="logo_combined.png" alt="Σenario">
    </a>
    <div class="site-header__actions">
      <a href="login.html" id="headerLogin"><span>Login</span></a>
      <div class="account-menu" id="accountMenu" style="display:none">
        <button class="account-menu__trigger" id="accountTrigger" aria-label="Account">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
        <div class="account-menu__dropdown" id="accountDropdown">
          <a href="account-orders.html">Orders</a>
          <a href="account-payments.html">Payment Methods</a>
          <a href="account-preferences.html">Preferences</a>
          <a href="admin.html" id="adminLink" style="display:none">Admin Dashboard</a>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
      <a href="cart.html" aria-label="Cart" class="cart-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <span class="cart-badge" id="cartBadge"></span>
      </a>
    </div>
  </header>

  <!-- ERROR -->
  <div class="error-body">
    <div class="error-code">404</div>
    <p class="error-label">Page not found</p>
    <h1 class="error-msg">This page doesn't<br>exist in our reality.</h1>
    <div class="error-links">
      <a class="error-link error-link--primary" href="index.html">Back to Moodboard</a>
      <a class="error-link" href="collection.html">View Collection</a>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p class="footer__legal">© 2025 Σenario — All Rights Reserved</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    gsap.to('.error-code',  { opacity: 1, y: 0, duration: 1,   ease: 'power3.out', delay: 0.1 });
    gsap.to('.error-label', { opacity: 1,       duration: 0.8,  ease: 'power3.out', delay: 0.4 });
    gsap.to('.error-msg',   { opacity: 1, y: 0, duration: 0.8,  ease: 'power3.out', delay: 0.55 });
    gsap.to('.error-links', { opacity: 1,       duration: 0.8,  ease: 'power3.out', delay: 0.75 });
  </script>
  <script src="api.js"></script>
  <script>
    snrInitNav();
    function logout() { snrLogout(); }
  </script>

</body>
</html>
