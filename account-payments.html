<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Methods — Σenario</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;700&family=DM+Mono:wght@300;400&family=Space+Grotesk:wght@500&family=Inter:wght@400&display=swap" rel="stylesheet">

  <style>
    :root {
      --white:   #ffffff;
      --black:   #0d0d0d;
      --orange:  #C4622D;
      --gray:    #9A9A9A;
      --border:  #e8e8e4;
      --ff-display:   'Bebas Neue', sans-serif;
      --ff-condensed: 'Barlow Condensed', sans-serif;
      --ff-mono:      'DM Mono', monospace;
      --ff-heading:   'Space Grotesk', sans-serif;
      --ff-body:      'Suisse Intl', 'Inter', sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    h1, h2, h3, h4, h5, h6 { font-family: var(--ff-heading); font-weight: 500; }
    body {
      background: var(--white);
      color: var(--black);
      font-family: var(--ff-body);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* HEADER */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--white);
      padding: 0 40px 20px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      border-bottom: 1px solid var(--border);
    }
    .site-header__nav { display: flex; gap: 28px; padding-top: 32px; }
    .site-header__nav a {
      font-family: var(--ff-heading); font-weight: 500; font-size: 13px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--orange); transition: color 0.2s;
    }
    .site-header__nav a:hover, .site-header__nav a.active { color: var(--black); }
    .site-header__logo { width: 340px; height: auto; justify-self: center; margin-top: -24px; }
    .site-header__actions {
      display: flex; align-items: center; gap: 18px;
      justify-content: flex-end; padding-top: 32px;
    }
    .site-header__actions a {
      font-family: var(--ff-heading); font-weight: 500; font-size: 13px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--black); transition: color 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .site-header__actions a:hover { color: var(--orange); }

    .cart-link { position: relative; }
    .cart-badge {
      position: absolute; top: -8px; right: -10px;
      min-width: 16px; height: 16px; padding: 0 4px;
      border-radius: 8px; background: var(--orange); color: var(--white);
      font-family: var(--ff-body); font-size: 9px; line-height: 16px;
      text-align: center; display: none; align-items: center; justify-content: center;
    }

    /* ACCOUNT MENU */
    .account-menu { position: relative; display: flex; align-items: center; }
    .account-menu__trigger {
      background: none; border: none; cursor: pointer;
      color: var(--black); display: flex; align-items: center;
      padding: 0; transition: color 0.2s;
    }
    .account-menu__trigger:hover { color: var(--orange); }
    .account-menu__dropdown {
      position: absolute; top: calc(100% + 10px); right: 0;
      background: var(--white); border: 1px solid var(--border);
      min-width: 190px; z-index: 200;
      display: none; flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .account-menu__dropdown.open { display: flex; }
    .account-menu__dropdown a,
    .account-menu__dropdown button {
      font-family: var(--ff-body); font-size: 9px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--black);
      padding: 13px 16px; border: none; background: none;
      text-align: left; cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
      text-decoration: none; display: block; width: 100%;
    }
    .account-menu__dropdown a:last-child,
    .account-menu__dropdown button:last-child { border-bottom: none; }
    .account-menu__dropdown a:hover,
    .account-menu__dropdown button:hover { background: var(--border); }
    .account-menu__dropdown .logout-btn { color: var(--gray); }
    .account-menu__dropdown .logout-btn:hover { color: var(--orange); background: transparent; }

    @media (max-width: 640px) {
      .site-header {
        padding: 14px 16px 12px;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        grid-template-areas:
          "nav actions"
          "logo logo";
        row-gap: 10px;
        align-items: center;
      }
      .site-header__nav {
        grid-area: nav;
        display: flex;
        gap: 12px;
        padding-top: 0;
      }
      .site-header__nav a { font-size: 9.5px; letter-spacing: 0.06em; }
      .site-header__logo { grid-area: logo; width: 150px; margin-top: 0; justify-self: center; }
      .site-header__actions { grid-area: actions; padding-top: 0; gap: 14px; }
      .site-header__actions a span { display: none; }
      .form-grid { grid-template-columns: 1fr; }
      .wallet-row { gap: 12px; }
    }

    /* PAGE LAYOUT */
    .account-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    .account-title {
      font-family: var(--ff-display);
      font-size: 48px;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .account-subtitle {
      font-family: var(--ff-body);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 48px;
    }

    /* CARDS */
    .card-grid { display: grid; gap: 16px; margin-bottom: 32px; }
    .payment-card {
      border: 1px solid var(--border);
      padding: 20px 24px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 20px;
    }
    .card-icon {
      width: 50px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }

    /* DIGITAL WALLETS */
    .wallet-section { margin-top: 40px; margin-bottom: 32px; }
    .wallet-section__title {
      font-family: var(--ff-body); font-size: 9px; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--gray);
      padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .wallet-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid var(--border);
    }
    .wallet-row:last-child { border-bottom: none; }
    .wallet-info { display: flex; align-items: center; gap: 16px; }
    .wallet-name {
      font-family: var(--ff-body); font-size: 15px;
      font-weight: 400; letter-spacing: 0.02em;
    }
    .wallet-status {
      font-family: var(--ff-body); font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--gray); margin-top: 3px;
    }
    .wallet-status.connected { color: #2d7a3c; }
    .btn-wallet {
      font-family: var(--ff-body); font-size: 9px; letter-spacing: 0.16em;
      text-transform: uppercase; padding: 10px 20px;
      border: 1px solid var(--border); background: none; cursor: pointer;
      color: var(--black); transition: border-color 0.2s, color 0.2s;
    }
    .btn-wallet:hover { border-color: var(--black); }
    .btn-wallet.connected { border-color: #2d7a3c; color: #2d7a3c; }
    .btn-wallet.connected:hover { border-color: #c0392b; color: #c0392b; }
    .card-details__name {
      font-family: var(--ff-body);
      font-size: 11px;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .card-details__meta {
      font-family: var(--ff-body);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
    }
    .card-remove {
      background: none; border: none; cursor: pointer;
      font-family: var(--ff-body); font-size: 9px;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--gray); transition: color 0.2s; padding: 4px;
    }
    .card-remove:hover { color: #c0392b; }

    /* ADD CARD FORM */
    .add-card-section { border-top: 1px solid var(--border); padding-top: 32px; }
    .add-card-title {
      font-family: var(--ff-body);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 24px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-grid .span2 { grid-column: 1 / -1; }
    .form-field {
      display: flex;
      flex-direction: column;
    }
    .form-field label {
      font-family: var(--ff-body);
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 8px;
    }
    .form-field input {
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      font-family: var(--ff-body);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--black);
      padding: 8px 0;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-field input:focus { border-bottom-color: var(--black); }
    .btn-primary {
      margin-top: 28px;
      display: inline-block;
      font-family: var(--ff-body);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px 32px;
      background: var(--black);
      color: var(--white);
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--orange); }

    .msg {
      font-family: var(--ff-body); font-size: 9px; letter-spacing: 0.14em;
      text-transform: uppercase; margin-top: 16px;
      display: none;
    }
    .msg--ok  { color: #2d7a3c; display: block; }
    .msg--err { color: #c0392b; display: block; }

    /* FOOTER */
    .site-footer {
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .footer__legal {
      font-family: var(--ff-body); font-size: 8px;
      letter-spacing: 0.18em; color: var(--gray); text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <nav class="site-header__nav">
      <a href="collection.html">Collection</a>
      <a href="index.html">Moodboard</a>
      <a href="concept.html">Concept</a>
    </nav>
    <a href="index.html">
      <img class="site-header__logo" src="logo_combined.png" alt="Σenario">
    </a>
    <div class="site-header__actions">
      <a href="login.html" id="headerLogin"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Login</span></a>
      <div class="account-menu" id="accountMenu" style="display:none">
        <button class="account-menu__trigger" id="accountTrigger" aria-label="Account">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
        <div class="account-menu__dropdown" id="accountDropdown">
          <a href="account-orders.html">Orders</a>
          <a href="account-payments.html">Payment Methods</a>
          <a href="account-preferences.html">Preferences</a>
          <a href="admin.html" id="adminLink" style="display:none">Admin Dashboard</a>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
      <a href="cart.html" aria-label="Cart" class="cart-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <span class="cart-badge" id="cartBadge"></span>
      </a>
    </div>
  </header>

  <div class="account-wrap">
    <h1 class="account-title">Payment Methods</h1>
    <p class="account-subtitle">Saved cards</p>

    <div class="card-grid" id="cardGrid"></div>

    <!-- DIGITAL WALLETS -->
    <div class="wallet-section" id="walletSection"></div>

    <div class="add-card-section">
      <p class="add-card-title">Add New Card</p>
      <div class="form-grid">
        <div class="form-field span2">
          <label>Cardholder Name</label>
          <input type="text" id="cardName" placeholder="Name on card" autocomplete="cc-name">
        </div>
        <div class="form-field span2">
          <label>Card Number</label>
          <input type="text" id="cardNumber" placeholder="•••• •••• •••• ••••" maxlength="19" autocomplete="cc-number">
        </div>
        <div class="form-field">
          <label>Expiry</label>
          <input type="text" id="cardExpiry" placeholder="MM / YY" maxlength="7" autocomplete="cc-exp">
        </div>
        <div class="form-field">
          <label>CVV</label>
          <input type="text" id="cardCvv" placeholder="•••" maxlength="4" autocomplete="cc-csc">
        </div>
      </div>
      <button class="btn-primary" onclick="addCard()">Save Card</button>
      <p class="msg" id="cardMsg"></p>
    </div>
  </div>

  <footer class="site-footer">
    <p class="footer__legal">© 2025 Σenario — All Rights Reserved</p>
  </footer>

  <script src="api.js"></script>
  <script>
    if (!localStorage.getItem('snr_token')) window.location.href = 'login.html';

    function seedCards() {
      if (localStorage.getItem('snr_cards')) return;
      localStorage.setItem('snr_cards', JSON.stringify([
        { type: 'visa', name: 'Ioannis Arsenidis', last4: '4242', expiry: '09/27' }
      ]));
    }

    var CARD_LOGOS = {
      visa: '<svg width="50" height="32" viewBox="0 0 50 32" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="32" rx="4" fill="#fff" stroke="#e8e8e4" stroke-width="1"/><text x="25" y="22" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="900" font-style="italic" fill="#1a1f71">VISA</text></svg>',
      mc:   '<svg width="50" height="32" viewBox="0 0 50 32" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="32" rx="4" fill="#fff" stroke="#e8e8e4" stroke-width="1"/><circle cx="19" cy="16" r="8" fill="#EB001B"/><circle cx="31" cy="16" r="8" fill="#F79E1B" opacity="0.9"/></svg>'
    };

    var WALLET_DEFS = [
      { id: 'gpay',     name: 'Google Pay', svg: '<svg width="50" height="32" viewBox="0 0 50 32" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="32" rx="4" fill="#fff" stroke="#e8e8e4" stroke-width="1"/><text x="8" y="22" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="#4285F4">G</text><text x="20" y="21" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="500" fill="#5F6368">Pay</text></svg>' },
      { id: 'paypal',   name: 'PayPal',     svg: '<svg width="50" height="32" viewBox="0 0 50 32" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="32" rx="4" fill="#fff" stroke="#e8e8e4" stroke-width="1"/><text x="6" y="21" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#003087">Pay</text><text x="26" y="21" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" fill="#009cde">Pal</text></svg>' },
      { id: 'applepay', name: 'Apple Pay',  svg: '<svg width="50" height="32" viewBox="0 0 50 32" xmlns="http://www.w3.org/2000/svg"><rect width="50" height="32" rx="4" fill="#000"/><text x="25" y="20" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="400" letter-spacing="0.5" fill="#fff">APPLE PAY</text></svg>' }
    ];

    function renderCards() {
      seedCards();
      var cards = JSON.parse(localStorage.getItem('snr_cards') || '[]');
      var grid = document.getElementById('cardGrid');
      grid.innerHTML = '';
      if (!cards.length) {
        grid.innerHTML = '<p style="font-family:var(--ff-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gray);">No saved cards.</p>';
        return;
      }
      cards.forEach(function(card, idx) {
        var logo = CARD_LOGOS[card.type] || '<svg width="50" height="32" viewBox="0 0 50 32"><rect width="50" height="32" rx="4" fill="#fff" stroke="#e8e8e4" stroke-width="1"/><text x="25" y="21" text-anchor="middle" font-family="Arial" font-size="9" fill="#9A9A9A">CARD</text></svg>';
        var el = document.createElement('div');
        el.className = 'payment-card';
        el.innerHTML =
          '<div class="card-icon">' + logo + '</div>' +
          '<div class="card-details">' +
            '<div class="card-details__name">' + card.name + '&nbsp;&nbsp;····&nbsp;' + card.last4 + '</div>' +
            '<div class="card-details__meta">Expires ' + card.expiry + '</div>' +
          '</div>' +
          '<button class="card-remove" onclick="removeCard(' + idx + ')">Remove</button>';
        grid.appendChild(el);
      });
    }

    function renderWallets() {
      var connected = JSON.parse(localStorage.getItem('snr_wallets') || '{}');
      var section = document.getElementById('walletSection');
      section.innerHTML = '<p class="wallet-section__title">Digital Wallets</p>';
      WALLET_DEFS.forEach(function(w) {
        var isOn = !!connected[w.id];
        var row = document.createElement('div');
        row.className = 'wallet-row';
        row.innerHTML =
          '<div class="wallet-info">' +
            '<div style="width:50px;height:32px;flex-shrink:0;">' + w.svg + '</div>' +
            '<div>' +
              '<div class="wallet-name">' + w.name + '</div>' +
              '<div class="wallet-status' + (isOn ? ' connected' : '') + '">' + (isOn ? 'Connected' : 'Not connected') + '</div>' +
            '</div>' +
          '</div>' +
          '<button class="btn-wallet' + (isOn ? ' connected' : '') + '" onclick="toggleWallet(\'' + w.id + '\')">' + (isOn ? 'Disconnect' : 'Connect') + '</button>';
        section.appendChild(row);
      });
    }

    function toggleWallet(id) {
      var connected = JSON.parse(localStorage.getItem('snr_wallets') || '{}');
      connected[id] = !connected[id];
      localStorage.setItem('snr_wallets', JSON.stringify(connected));
      renderWallets();
    }

    function removeCard(idx) {
      var cards = JSON.parse(localStorage.getItem('snr_cards') || '[]');
      cards.splice(idx, 1);
      localStorage.setItem('snr_cards', JSON.stringify(cards));
      renderCards();
    }

    function addCard() {
      var name   = document.getElementById('cardName').value.trim();
      var number = document.getElementById('cardNumber').value.replace(/\s/g,'');
      var expiry = document.getElementById('cardExpiry').value.trim();
      var msg    = document.getElementById('cardMsg');
      msg.className = 'msg';
      if (!name || number.length < 13 || !expiry) {
        msg.textContent = 'Please fill in all fields correctly.';
        msg.className = 'msg msg--err';
        return;
      }
      var last4 = number.slice(-4);
      var type  = number[0] === '4' ? 'visa' : (number[0] === '5' ? 'mc' : 'mc');
      var cards = JSON.parse(localStorage.getItem('snr_cards') || '[]');
      cards.push({ type: type, name: name, last4: last4, expiry: expiry });
      localStorage.setItem('snr_cards', JSON.stringify(cards));
      document.getElementById('cardName').value = '';
      document.getElementById('cardNumber').value = '';
      document.getElementById('cardExpiry').value = '';
      document.getElementById('cardCvv').value = '';
      msg.textContent = 'Card saved.';
      msg.className = 'msg msg--ok';
      renderCards();
    }

    document.getElementById('cardNumber').addEventListener('input', function() {
      var v = this.value.replace(/\D/g,'').substring(0,16);
      this.value = v.replace(/(.{4})/g,'$1 ').trim();
    });
    document.getElementById('cardExpiry').addEventListener('input', function() {
      var v = this.value.replace(/\D/g,'').substring(0,4);
      if (v.length > 2) v = v.slice(0,2) + ' / ' + v.slice(2);
      this.value = v;
    });

    renderCards();
    renderWallets();

    snrInitNav();
    function logout() { snrLogout(); }
  </script>

</body>
</html>
