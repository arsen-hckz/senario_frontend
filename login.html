<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Σenario</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --white:   #ffffff;
      --black:   #0d0d0d;
      --orange:  #C4622D;
      --gray:    #9A9A9A;
      --border:  #e8e8e4;
      --ff-display:   'Bebas Neue', sans-serif;
      --ff-condensed: 'Barlow Condensed', sans-serif;
      --ff-mono:      'DM Mono', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    img  { display: block; max-width: 100%; }
    a    { color: inherit; text-decoration: none; }

    body {
      background: var(--white);
      color: var(--black);
      font-family: var(--ff-condensed);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ─── LAYOUT ─────────────────────────────────── */
    .page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    @media (max-width: 768px) {
      body { overflow: auto; }
      .page { grid-template-columns: 1fr; height: auto; }
      .photo-panel { display: none; }
    }

    /* ─── PHOTO PANEL ────────────────────────────── */
    .photo-panel {
      position: relative;
      overflow: hidden;
    }

    .photo-panel__img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: grayscale(18%);
    }

    .photo-panel__scrim {
      position: absolute; inset: 0;
      background: linear-gradient(
        135deg,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.25) 100%
      );
    }

    .photo-panel__brand {
      position: absolute; bottom: 40px; left: 40px;
    }

    .photo-panel__brand img {
      width: 140px; filter: invert(1);
      opacity: 0.85;
    }

    .photo-panel__quote {
      position: absolute; top: 40px; left: 40px; right: 40px;
      font-family: var(--ff-mono); font-size: 8px; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
    }

    /* ─── FORM PANEL ─────────────────────────────── */
    .form-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 72px;
      overflow-y: auto;
    }

    @media (max-width: 1024px) {
      .form-panel { padding: 60px 48px; }
    }

    @media (max-width: 768px) {
      .form-panel { padding: 48px 32px 64px; min-height: 100vh; }
    }

    /* back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--ff-mono); font-size: 8px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gray);
      margin-bottom: 56px; transition: color 0.2s;
    }
    .back-link:hover { color: var(--black); }
    .back-link svg { flex-shrink: 0; }

    /* tabs */
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
    }

    .auth-tab {
      font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.2em;
      text-transform: uppercase; padding-bottom: 14px;
      margin-right: 28px; cursor: pointer; border: none;
      background: none; color: var(--gray);
      border-bottom: 1px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .auth-tab.active {
      color: var(--black);
      border-bottom-color: var(--black);
    }

    /* heading */
    .auth-heading {
      font-family: var(--ff-condensed); font-weight: 300;
      font-size: clamp(36px, 4vw, 56px); line-height: 1;
      margin-bottom: 8px;
    }

    .auth-sub {
      font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--gray); margin-bottom: 40px;
    }

    /* form */
    .auth-form { display: flex; flex-direction: column; gap: 20px; }
    .auth-form.hidden { display: none; }

    .field { display: flex; flex-direction: column; gap: 7px; }

    .field__label {
      font-family: var(--ff-mono); font-size: 8px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gray);
    }

    .field__input {
      padding: 13px 0;
      border: none; border-bottom: 1px solid var(--border);
      background: transparent;
      font-family: var(--ff-condensed); font-weight: 300; font-size: 17px;
      color: var(--black); outline: none;
      transition: border-color 0.2s;
    }

    .field__input::placeholder { color: var(--border); }
    .field__input:focus { border-bottom-color: var(--black); }

    .field__row {
      display: flex; justify-content: flex-end;
      margin-top: -8px;
    }

    .field__link {
      font-family: var(--ff-mono); font-size: 8px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--gray); transition: color 0.2s;
    }
    .field__link:hover { color: var(--orange); }

    .auth-submit {
      margin-top: 8px;
      padding: 15px;
      background: var(--black); color: var(--white);
      font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.24em;
      text-transform: uppercase; border: none; cursor: pointer;
      transition: background 0.2s;
    }
    .auth-submit:hover { background: var(--orange); }

    .auth-divider {
      display: flex; align-items: center; gap: 14px; margin: 4px 0;
      font-family: var(--ff-mono); font-size: 8px; letter-spacing: 0.14em;
      color: var(--border);
    }
    .auth-divider::before,
    .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .auth-switch {
      text-align: center;
      font-family: var(--ff-mono); font-size: 8px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--gray);
    }

    .auth-switch button {
      background: none; border: none; cursor: pointer;
      font-family: var(--ff-mono); font-size: 8px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--black);
      text-decoration: underline; text-underline-offset: 3px;
      transition: color 0.2s;
    }
    .auth-switch button:hover { color: var(--orange); }

    /* password toggle */
    .field--pass { position: relative; }
    .field--pass .field__input { padding-right: 32px; }
    .pass-toggle {
      position: absolute; right: 0; bottom: 13px;
      background: none; border: none; cursor: pointer;
      font-family: var(--ff-mono); font-size: 7px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--gray); transition: color 0.2s;
    }
    .pass-toggle:hover { color: var(--black); }
  </style>
</head>
<body>

<div class="page">

  <!-- PHOTO SIDE -->
  <div class="photo-panel">
    <img class="photo-panel__img"
         src="extracted_images/page5_img1.jpeg" alt="">
    <div class="photo-panel__scrim"></div>
    <p class="photo-panel__quote">Σenario / A new form of luxury</p>
    <div class="photo-panel__brand">
      <img src="logo_graffiti.png" alt="Σenario">
    </div>
  </div>

  <!-- FORM SIDE -->
  <div class="form-panel">

    <a class="back-link" href="index.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back to site
    </a>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="panelLogin">
      <h1 class="auth-heading">Welcome back.</h1>
      <p class="auth-sub">Sign in to your account</p>
      <form class="auth-form" onsubmit="handleLogin(event)">
        <div class="field">
          <label class="field__label">Email</label>
          <input class="field__input" type="email" placeholder="your@email.com" required>
        </div>
        <div class="field field--pass">
          <label class="field__label">Password</label>
          <input class="field__input" type="password" id="loginPass" placeholder="••••••••" required>
          <button type="button" class="pass-toggle" onclick="togglePass('loginPass', this)">Show</button>
        </div>
        <div class="field__row">
          <a class="field__link" href="#">Forgot password?</a>
        </div>
        <button class="auth-submit" type="submit">Sign in</button>
        <div class="auth-divider">or</div>
        <div class="auth-switch">
          No account? <button type="button" onclick="switchTab('register')">Create one</button>
        </div>
      </form>
    </div>

    <!-- REGISTER FORM -->
    <div id="panelRegister" style="display:none">
      <h1 class="auth-heading">Join ΣΝΡ.</h1>
      <p class="auth-sub">Create your account</p>
      <form class="auth-form" onsubmit="handleRegister(event)">
        <div class="field">
          <label class="field__label">Full name</label>
          <input class="field__input" type="text" placeholder="Your name" required>
        </div>
        <div class="field">
          <label class="field__label">Email</label>
          <input class="field__input" type="email" placeholder="your@email.com" required>
        </div>
        <div class="field field--pass">
          <label class="field__label">Password</label>
          <input class="field__input" type="password" id="regPass" placeholder="••••••••" required>
          <button type="button" class="pass-toggle" onclick="togglePass('regPass', this)">Show</button>
        </div>
        <div class="field field--pass">
          <label class="field__label">Confirm password</label>
          <input class="field__input" type="password" id="regPassConfirm" placeholder="••••••••" required>
          <button type="button" class="pass-toggle" onclick="togglePass('regPassConfirm', this)">Show</button>
        </div>
        <button class="auth-submit" type="submit">Create account</button>
        <div class="auth-divider">or</div>
        <div class="auth-switch">
          Already have an account? <button type="button" onclick="switchTab('login')">Sign in</button>
        </div>
      </form>
    </div>

  </div>
</div>

<script>
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('panelLogin').style.display    = isLogin ? 'block' : 'none';
    document.getElementById('panelRegister').style.display = isLogin ? 'none'  : 'block';
  }

  function handleLogin(e) {
    e.preventDefault();
    localStorage.setItem('snr_loggedIn', '1');
    window.location.href = 'index.html';
  }

  function handleRegister(e) {
    e.preventDefault();
    const pass    = document.getElementById('regPass').value;
    const confirm = document.getElementById('regPassConfirm').value;
    if (pass !== confirm) {
      document.getElementById('regPassConfirm').style.borderBottomColor = '#c0392b';
      return;
    }
    localStorage.setItem('snr_loggedIn', '1');
    window.location.href = 'index.html';
  }

  function togglePass(id, btn) {
    const input = document.getElementById(id);
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    btn.textContent = show ? 'Hide' : 'Show';
  }

  // if URL has ?tab=register, open register tab
  if (new URLSearchParams(location.search).get('tab') === 'register') {
    switchTab('register');
  }
</script>

</body>
</html>
