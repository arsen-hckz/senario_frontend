<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item — Σenario</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --white:   #ffffff;
      --black:   #0d0d0d;
      --olive:   #6B6B3A;
      --orange:  #C4622D;
      --gray:    #9A9A9A;
      --border:  #e8e8e4;
      --gap:     10px;

      --ff-display:   'Bebas Neue', sans-serif;
      --ff-condensed: 'Barlow Condensed', sans-serif;
      --ff-mono:      'DM Mono', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    img  { display: block; max-width: 100%; }
    a    { color: inherit; text-decoration: none; }

    body {
      background: var(--white);
      color: var(--black);
      font-family: var(--ff-condensed);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── HEADER ─────────────────────────────────── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      padding: 0 40px 10px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
    }

    .site-header__nav {
      display: flex;
      gap: 28px;
      padding-top: 22px;
    }

    .site-header__nav a {
      font-family: var(--ff-mono);
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--black);
      transition: color 0.2s;
    }

    .site-header__nav a:hover,
    .site-header__nav a.active { color: var(--orange); }

    .site-header__actions {
      display: flex;
      align-items: center;
      gap: 18px;
      justify-content: flex-end;
      padding-top: 22px;
    }

    .site-header__actions a {
      font-family: var(--ff-mono);
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--black);
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .site-header__actions a:hover { color: var(--orange); }

    .site-header__logo {
      width: 260px;
      height: auto;
      justify-self: center;
      margin-top: -18px;
    }

    @media (max-width: 640px) {
      .site-header { padding: 20px 16px; }
      .site-header__logo { width: 160px; }
      .site-header__nav a,
      .site-header__actions a span { display: none; }
    }

    /* ─── BREADCRUMB ─────────────────────────────── */
    .breadcrumb {
      padding: 16px 40px;
      font-family: var(--ff-mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray);
      border-bottom: 1px solid var(--border);
    }

    .breadcrumb a { transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--orange); }
    .breadcrumb span { margin: 0 8px; }

    /* ─── PRODUCT VIEW ───────────────────────────── */
    .product-view {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: calc(100vh - 200px);
    }

    @media (max-width: 768px) {
      .product-view { grid-template-columns: 1fr; }
    }

    /* ─── IMAGE SIDE ─────────────────────────────── */
    .product-images {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--border);
    }

    .product-images img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 40px;
    }

    @media (max-width: 768px) {
      .product-images {
        position: relative;
        height: 60vw;
        min-height: 320px;
      }
    }

    /* ─── DETAILS SIDE ───────────────────────────── */
    .product-details {
      padding: 56px 56px 80px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .product-details__eyebrow {
      font-family: var(--ff-mono);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 12px;
    }

    .product-details__name {
      font-family: var(--ff-display);
      font-size: clamp(40px, 5vw, 64px);
      line-height: 1;
      letter-spacing: 0.02em;
      margin-bottom: 16px;
    }

    .product-details__price {
      font-family: var(--ff-mono);
      font-size: 18px;
      letter-spacing: 0.1em;
      margin-bottom: 36px;
    }

    .product-details__divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 36px;
    }

    /* Sizes */
    .product-details__label {
      font-family: var(--ff-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 12px;
    }

    .size-grid {
      display: flex;
      gap: 8px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .size-btn {
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
      background: none;
      font-family: var(--ff-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .size-btn:hover,
    .size-btn.selected {
      background: var(--black);
      border-color: var(--black);
      color: var(--white);
    }

    /* Add to Cart */
    .btn-atc {
      width: 100%;
      padding: 18px;
      background: var(--black);
      color: var(--white);
      border: none;
      font-family: var(--ff-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 12px;
    }

    .btn-atc:hover { background: var(--orange); }

    .btn-atc.added {
      background: var(--orange);
      pointer-events: none;
    }

    .btn-wishlist {
      width: 100%;
      padding: 16px;
      background: none;
      color: var(--black);
      border: 1px solid var(--border);
      font-family: var(--ff-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      margin-bottom: 40px;
      display: block;
      text-align: center;
    }

    .btn-wishlist:hover { border-color: var(--orange); color: var(--orange); }

    /* Description */
    .product-details__desc {
      font-family: var(--ff-condensed);
      font-size: 15px;
      font-weight: 300;
      line-height: 1.7;
      color: var(--gray);
      border-top: 1px solid var(--border);
      padding-top: 28px;
    }

    /* ─── FOOTER ─────────────────────────────────── */
    .site-footer {
      padding: 60px 24px 44px;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    .footer__logo {
      width: 200px;
      height: auto;
      margin: 0 auto 14px;
      display: block;
    }

    .footer__slogan {
      font-family: var(--ff-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--gray);
      text-transform: uppercase;
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .footer__socials {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-bottom: 36px;
    }

    .social-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .social-btn:hover { border-color: var(--orange); color: var(--orange); }

    .footer__legal {
      font-family: var(--ff-mono);
      font-size: 8px;
      letter-spacing: 0.18em;
      color: var(--border);
      text-transform: uppercase;
    }

    /* ─── ACCOUNT MENU ───────────────────────────── */
    .account-menu { position: relative; display: flex; align-items: center; }
    .account-menu__trigger {
      background: none; border: none; cursor: pointer;
      color: var(--black); display: flex; align-items: center;
      padding: 0; transition: color 0.2s;
    }
    .account-menu__trigger:hover { color: var(--orange); }
    .account-menu__dropdown {
      position: absolute; top: calc(100% + 10px); right: 0;
      background: var(--white); border: 1px solid var(--border);
      min-width: 190px; z-index: 200;
      display: none; flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .account-menu__dropdown.open { display: flex; }
    .account-menu__dropdown a,
    .account-menu__dropdown button {
      font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--black);
      padding: 13px 16px; border: none; background: none;
      text-align: left; cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border-bottom: 1px solid var(--border);
      text-decoration: none; display: block; width: 100%;
    }
    .account-menu__dropdown button:last-child { border-bottom: none; }
    .account-menu__dropdown a:hover,
    .account-menu__dropdown button:hover { background: var(--black); color: var(--white); }
    .account-menu__dropdown .logout-btn { color: var(--gray); }
    .account-menu__dropdown .logout-btn:hover { background: var(--black); color: var(--orange); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <nav class="site-header__nav">
      <a href="collection.html" class="active">Collection</a>
      <a href="index.html">Moodboard</a>
      <a href="concept.html">Concept</a>
    </nav>

    <a href="index.html">
      <img class="site-header__logo" src="logo_combined.png" alt="Σenario">
    </a>

    <div class="site-header__actions">
      <a href="login.html" id="headerLogin"><span>Login</span></a>
      <div class="account-menu" id="accountMenu" style="display:none">
        <button class="account-menu__trigger" id="accountTrigger" aria-label="Account">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
        <div class="account-menu__dropdown" id="accountDropdown">
          <a href="#">Orders</a>
          <a href="#">Personal Data</a>
          <a href="#">Payment Methods</a>
          <a href="#">Preferences</a>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
      <a href="cart.html" aria-label="Cart">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <a href="collection.html">Collection</a>
    <span>/</span>
    <span id="bc-name">—</span>
  </div>

  <!-- PRODUCT VIEW -->
  <div class="product-view">
    <div class="product-images">
      <img id="prod-img" src="" alt="">
    </div>
    <div class="product-details">
      <p class="product-details__eyebrow">Σenario / SS 2025</p>
      <h1 class="product-details__name" id="prod-name">—</h1>
      <p class="product-details__price" id="prod-price">€—</p>
      <div class="product-details__divider"></div>
      <p class="product-details__label">Size</p>
      <div class="size-grid" id="size-grid"></div>
      <button class="btn-atc">Add to Cart</button>
      <a class="btn-wishlist" href="checkout.html">Buy it Now</a>
      <p class="product-details__desc" id="prod-desc"></p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <img class="footer__logo" src="logo_graffiti.png" alt="Σenario">
    <p class="footer__slogan">A new form of luxury.<br>Built from reality, not status.</p>

    <div class="footer__socials">
      <a href="#" class="social-btn" aria-label="Instagram">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a href="#" class="social-btn" aria-label="TikTok">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88
                   2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01
                   a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34
                   6.34 6.34 0 006.33-6.34V8.56a8.22 8.22 0 004.8 1.54V6.67a4.85 4.85 0 01-1.03-.02z"/>
        </svg>
      </a>
      <a href="#" class="social-btn" aria-label="Email">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
      </a>
    </div>

    <p class="footer__legal">© 2025 Σenario — All Rights Reserved</p>
  </footer>

  <script>
    const products = {
      1: { name: 'Item 01', price: '€59',  img: 'test images/TS01556BLK.jpg',                              sizes: ['XS','S','M','L','XL'], desc: 'Built for the streets — every piece worn with intention.' },
      2: { name: 'Item 02', price: '€129', img: 'test images/d0e8fa2825a148d3b7cce5adac3a3901.webp',        sizes: ['S','M','L','XL'],     desc: 'Raw texture meets controlled expression.' },
      3: { name: 'Item 03', price: '€89',  img: 'test images/0001s_0000_Curves12copy_0001_Layer2.avif',     sizes: ['XS','S','M','L'],     desc: 'Minimal composition. Silent dominance.' },
      4: { name: 'Item 04', price: '€175', img: 'test images/46-04221_1_copy.webp',                         sizes: ['S','M','L','XL'],     desc: 'Industrial symmetry. Identity remains constant.' },
      5: { name: 'Item 05', price: '€95',  img: 'test images/15-00247_1_copy.webp',                         sizes: ['One Size'],           desc: 'Presence without noise.' },
      6: { name: 'Item 06', price: '€149', img: 'test images/01-01431_1_copy.webp',                         sizes: ['One Size'],           desc: 'Dark minimal tones. Orange as controlled energy.' },
      7: { name: 'Item 07', price: '€65',  img: 'test images/mockup_sizescopy2.webp',                       sizes: ['XS','S','M','L','XL'], desc: 'Authenticity over perfection.' },
    };

    const id = parseInt(new URLSearchParams(window.location.search).get('id')) || 1;
    const p = products[id] || products[1];

    document.getElementById('bc-name').textContent   = p.name;
    document.getElementById('prod-name').textContent = p.name;
    document.getElementById('prod-price').textContent = p.price;
    document.getElementById('prod-img').src          = p.img;
    document.getElementById('prod-img').alt          = p.name;
    document.getElementById('prod-desc').textContent = p.desc;
    document.title = p.name + ' — Σenario';

    document.querySelector('.btn-atc').addEventListener('click', function() {
      this.textContent = '✓ Added to Cart';
      this.classList.add('added');
      clearTimeout(this._t);
      this._t = setTimeout(() => {
        this.textContent = 'Add to Cart';
        this.classList.remove('added');
      }, 2000);
    });

    const sizeGrid = document.getElementById('size-grid');
    p.sizes.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'size-btn' + (i === 0 ? ' selected' : '');
      btn.textContent = s;
      btn.addEventListener('click', () => {
        sizeGrid.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });
      sizeGrid.appendChild(btn);
    });
    (function() {
      if (localStorage.getItem('snr_loggedIn')) {
        var l = document.getElementById('headerLogin');
        var m = document.getElementById('accountMenu');
        if (l) l.style.display = 'none';
        if (m) m.style.display = 'flex';
      }
      var trigger = document.getElementById('accountTrigger');
      var drop    = document.getElementById('accountDropdown');
      if (trigger && drop) {
        trigger.addEventListener('click', function(e) { e.stopPropagation(); drop.classList.toggle('open'); });
        document.addEventListener('click', function() { drop.classList.remove('open'); });
      }
    })();
    function logout() { localStorage.removeItem('snr_loggedIn'); window.location.href = 'index.html'; }
  </script>

</body>
</html>
