<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection — Σenario</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --white:   #ffffff;
      --black:   #0d0d0d;
      --olive:   #6B6B3A;
      --orange:  #C4622D;
      --gray:    #9A9A9A;
      --border:  #e8e8e4;
      --gap:     10px;

      --ff-display:   'Bebas Neue', sans-serif;
      --ff-condensed: 'Barlow Condensed', sans-serif;
      --ff-mono:      'DM Mono', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    img  { display: block; max-width: 100%; }
    a    { color: inherit; text-decoration: none; }

    body {
      background: var(--white);
      color: var(--black);
      font-family: var(--ff-condensed);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── HEADER ─────────────────────────────────── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      padding: 0 40px 10px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
    }

    .site-header__nav {
      display: flex;
      gap: 28px;
      padding-top: 22px;
    }

    .site-header__nav a {
      font-family: var(--ff-mono);
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--black);
      transition: color 0.2s;
    }

    .site-header__nav a:hover,
    .site-header__nav a.active { color: var(--orange); }

    .site-header__actions {
      display: flex;
      align-items: center;
      gap: 18px;
      justify-content: flex-end;
      padding-top: 22px;
    }

    .site-header__actions a {
      font-family: var(--ff-mono);
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--black);
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .site-header__actions a:hover { color: var(--orange); }

    .site-header__logo {
      width: 260px;
      height: auto;
      justify-self: center;
      margin-top: -18px;
    }

    @media (max-width: 640px) {
      .site-header { padding: 20px 16px; }
      .site-header__logo { width: 160px; }
      .site-header__nav a,
      .site-header__actions a span { display: none; }
    }

    /* ─── COLLECTION HEADER ──────────────────────── */
    .collection-header {
      padding: 48px 200px 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }

    .collection-header__eyebrow {
      font-family: var(--ff-mono);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 10px;
    }

    .collection-header__title {
      font-family: var(--ff-display);
      font-size: clamp(48px, 6vw, 80px);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .collection-header__count {
      font-family: var(--ff-mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--gray);
      margin-top: 10px;
      text-transform: uppercase;
    }

    @media (max-width: 900px) {
      .collection-header { padding: 36px 40px 24px; }
    }

    /* ─── PRODUCT GRID ───────────────────────────── */
    .product-section {
      padding: 0 200px 100px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px 20px;
    }

    @media (max-width: 900px) {
      .product-section { padding: 0 40px 80px; }
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 24px 16px; }
    }

    @media (max-width: 480px) {
      .product-section { padding: 0 16px 60px; }
      .product-grid { grid-template-columns: 1fr; }
    }

    /* ─── PRODUCT CARD ───────────────────────────── */
    .product-card {
      opacity: 0;
      transform: translateY(24px);
      cursor: pointer;
    }

    .product-card__image {
      position: relative;
      overflow: hidden;
      background: var(--border);
      margin-bottom: 14px;
    }

    .product-card__image img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      display: block;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.45s ease;
      filter: grayscale(10%);
    }

    .product-card:hover .product-card__image img {
      transform: scale(1.04);
      filter: grayscale(0%);
    }

    .product-card__atc {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--black);
      color: var(--white);
      font-family: var(--ff-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      padding: 13px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  background 0.2s ease;
      cursor: pointer;
      border: none;
      width: 100%;
    }

    .product-card:hover .product-card__atc,
    .product-card__atc.added {
      transform: translateY(0);
    }

    .product-card__atc.added {
      background: var(--orange);
      pointer-events: none;
    }

    .product-card__tag {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--black);
      color: var(--white);
      font-family: var(--ff-mono);
      font-size: 7px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 4px 7px;
    }

    .product-card__info {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .product-card__name {
      font-family: var(--ff-condensed);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .product-card__price {
      font-family: var(--ff-mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--gray);
    }

    /* ─── STOCK STATES ──────────────────────────── */
    .stock-tag {
      position: absolute; top: 10px; right: 10px;
      font-family: var(--ff-mono); font-size: 7px;
      letter-spacing: 0.18em; text-transform: uppercase; padding: 4px 7px;
      pointer-events: none;
    }
    .stock-tag--low { background: #fdf0e8; color: var(--orange); }
    .stock-tag--oos { background: var(--black); color: var(--white); }

    .product-card__atc.oos {
      background: var(--gray);
      cursor: not-allowed;
    }
    .product-card--oos .product-card__image img { filter: grayscale(40%); }
    .product-card--oos:hover .product-card__image img {
      filter: grayscale(40%);
      transform: none;
    }

    .product-card__name-row { display: flex; align-items: center; gap: 8px; }
    .product-card__oos-label {
      font-family: var(--ff-mono); font-size: 7px;
      letter-spacing: 0.16em; text-transform: uppercase; color: var(--gray);
      white-space: nowrap;
    }

    /* SALE */
    .product-card__tag--sale { background: var(--orange); }
    .product-card__price-wrap {
      display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
    }
    .product-card__price--original {
      font-family: var(--ff-mono); font-size: 10px; letter-spacing: 0.1em;
      color: var(--gray); text-decoration: line-through;
    }
    .product-card__price--sale {
      font-family: var(--ff-mono); font-size: 12px; letter-spacing: 0.1em;
      color: var(--orange);
    }

    /* ─── FOOTER ─────────────────────────────────── */
    .site-footer {
      padding: 60px 24px 44px;
      text-align: center;
      border-top: 1px solid var(--border);
    }

    .footer__logo {
      width: 200px;
      height: auto;
      margin: 0 auto 14px;
      display: block;
    }

    .footer__slogan {
      font-family: var(--ff-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--gray);
      text-transform: uppercase;
      line-height: 1.8;
      margin-bottom: 32px;
    }

    .footer__socials {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-bottom: 36px;
    }

    .social-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }

    .social-btn:hover { border-color: var(--orange); color: var(--orange); }

    .footer__legal {
      font-family: var(--ff-mono);
      font-size: 8px;
      letter-spacing: 0.18em;
      color: var(--border);
      text-transform: uppercase;
    }

    /* ─── ACCOUNT MENU ───────────────────────────── */
    .account-menu { position: relative; display: flex; align-items: center; }
    .account-menu__trigger {
      background: none; border: none; cursor: pointer;
      color: var(--black); display: flex; align-items: center;
      padding: 0; transition: color 0.2s;
    }
    .account-menu__trigger:hover { color: var(--orange); }
    .account-menu__dropdown {
      position: absolute; top: calc(100% + 10px); right: 0;
      background: var(--white); border: 1px solid var(--border);
      min-width: 190px; z-index: 200;
      display: none; flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .account-menu__dropdown.open { display: flex; }
    .account-menu__dropdown a,
    .account-menu__dropdown button {
      font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--black);
      padding: 13px 16px; border: none; background: none;
      text-align: left; cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border-bottom: 1px solid var(--border);
      text-decoration: none; display: block; width: 100%;
    }
    .account-menu__dropdown button:last-child { border-bottom: none; }
    .account-menu__dropdown a:hover,
    .account-menu__dropdown button:hover { background: var(--black); color: var(--white); }
    .account-menu__dropdown .logout-btn { color: var(--gray); }
    .account-menu__dropdown .logout-btn:hover { background: var(--black); color: var(--orange); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <nav class="site-header__nav">
      <a href="collection.html" class="active">Collection</a>
      <a href="index.html">Moodboard</a>
      <a href="concept.html">Concept</a>
    </nav>

    <a href="index.html">
      <img class="site-header__logo" src="logo_combined.png" alt="Σenario">
    </a>

    <div class="site-header__actions">
      <a href="login.html" id="headerLogin"><span>Login</span></a>
      <div class="account-menu" id="accountMenu" style="display:none">
        <button class="account-menu__trigger" id="accountTrigger" aria-label="Account">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
        <div class="account-menu__dropdown" id="accountDropdown">
          <a href="account-orders.html">Orders</a>
          <a href="account-payments.html">Payment Methods</a>
          <a href="account-preferences.html">Preferences</a>
          <a href="admin.html" id="adminLink" style="display:none">Admin Dashboard</a>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
      <a href="cart.html" aria-label="Cart">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- COLLECTION HEADER -->
  <div class="collection-header">
    <p class="collection-header__eyebrow">Σenario / SS 2025</p>
    <h1 class="collection-header__title">Collection</h1>
    <p class="collection-header__count">7 Pieces</p>
  </div>

  <!-- PRODUCT GRID -->
  <section class="product-section">
    <div class="product-grid" id="productGrid"></div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <img class="footer__logo" src="logo_graffiti.png" alt="Σenario">
    <p class="footer__slogan">A new form of luxury.<br>Built from reality, not status.</p>

    <div class="footer__socials">
      <a href="#" class="social-btn" aria-label="Instagram">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a href="#" class="social-btn" aria-label="TikTok">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88
                   2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01
                   a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34
                   6.34 6.34 0 006.33-6.34V8.56a8.22 8.22 0 004.8 1.54V6.67a4.85 4.85 0 01-1.03-.02z"/>
        </svg>
      </a>
      <a href="#" class="social-btn" aria-label="Email">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
      </a>
    </div>

    <p class="footer__legal">© 2025 Σenario — All Rights Reserved</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    var defaultProducts = [
      { name:'Item 01', price:59,  qty:25, sizes:'XS,S,M,L,XL', tag:'New',  image:'test images/TS01556BLK.jpg',                                 desc:'Essential tee in heavyweight cotton.' },
      { name:'Item 02', price:129, qty:8,  sizes:'S,M,L,XL',     tag:'New',  image:'test images/d0e8fa2825a148d3b7cce5adac3a3901.webp',           desc:'Relaxed fit overshirt.' },
      { name:'Item 03', price:89,  qty:30, sizes:'XS,S,M,L',     tag:'New',  image:'test images/0001s_0000_Curves12copy_0001_Layer2.avif',        desc:'Curved-hem essential.' },
      { name:'Item 04', price:175, qty:0,  sizes:'S,M,L,XL,XXL', tag:'New',  image:'test images/46-04221_1_copy.webp',                            desc:'Heavy cargo trousers.' },
      { name:'Item 05', price:95,  qty:20, sizes:'XS,S,M,L',     tag:'New',  image:'test images/15-00247_1_copy.webp',                            desc:'Long-sleeve layering piece.' },
      { name:'Item 06', price:149, qty:5,  sizes:'S,M,L,XL',     tag:'New',  image:'test images/01-01431_1_copy.webp',                            desc:'Technical outerwear jacket.' },
      { name:'Item 07', price:65,  qty:15, sizes:'XS,S,M,L,XL',  tag:'New',  image:'test images/mockup_sizescopy2.webp',                         desc:'Graphic print tee.' }
    ];

    function getProducts() {
      var stored = localStorage.getItem('snr_products');
      if (!stored) {
        localStorage.setItem('snr_products', JSON.stringify(defaultProducts));
        return defaultProducts;
      }
      var products = JSON.parse(stored);
      var migrated = false;
      products.forEach(function(p) {
        if (p.qty === undefined)       { p.qty = 99;   migrated = true; }
        if (p.salePrice === undefined) { p.salePrice = null; migrated = true; }
      });
      if (migrated) localStorage.setItem('snr_products', JSON.stringify(products));
      return products;
    }

    function renderGrid() {
      var products = getProducts();
      var grid  = document.getElementById('productGrid');
      var count = document.querySelector('.collection-header__count');
      if (count) count.textContent = products.length + ' Piece' + (products.length === 1 ? '' : 's');
      grid.innerHTML = '';

      products.forEach(function(p, i) {
        var oos    = p.qty === 0;
        var low    = !oos && p.qty < 10;
        var onSale = !oos && p.salePrice && p.salePrice > 0 && p.salePrice < p.price;

        // Stock tag (top-right corner of image)
        var stockTag = oos ? '<span class="stock-tag stock-tag--oos">Out of Stock</span>'
                    : low ? '<span class="stock-tag stock-tag--low">Low Stock</span>'
                    : '';

        // Product tag (top-left — "Sale" overrides "New" etc.)
        var tagHtml = onSale
          ? '<span class="product-card__tag product-card__tag--sale">Sale</span>'
          : (p.tag ? '<span class="product-card__tag">' + p.tag + '</span>' : '');

        var atcBtn = oos
          ? '<button class="product-card__atc oos" onclick="event.stopPropagation()">Out of Stock</button>'
          : '<button class="product-card__atc" onclick="addToCart(event, this, ' + i + ')">Add to Cart</button>';

        var nameHtml = oos
          ? '<div class="product-card__name-row"><span class="product-card__name">' + p.name + '</span><span class="product-card__oos-label">Out of Stock</span></div>'
          : '<span class="product-card__name">' + p.name + '</span>';

        var priceHtml = onSale
          ? '<div class="product-card__price-wrap"><span class="product-card__price--original">€' + p.price + '</span><span class="product-card__price--sale">€' + p.salePrice + '</span></div>'
          : '<span class="product-card__price">€' + p.price + '</span>';

        var card = document.createElement('a');
        card.className = 'product-card' + (oos ? ' product-card--oos' : '');
        card.href = 'product.html?id=' + (i + 1);
        card.innerHTML =
          '<div class="product-card__image">' +
            '<img src="' + p.image + '" alt="' + p.name + '">' +
            tagHtml + stockTag + atcBtn +
          '</div>' +
          '<div class="product-card__info">' +
            nameHtml + priceHtml +
          '</div>';

        card.style.opacity = '0';
        card.style.transform = 'translateY(24px)';
        grid.appendChild(card);

        gsap.to(card, {
          opacity: 1, y: 0, duration: 0.8, ease: 'power3.out',
          delay: i * 0.08,
          scrollTrigger: { trigger: card, start: 'top 88%' }
        });
      });
    }

    function addToCart(e, btn, productIdx) {
      e.preventDefault();
      e.stopPropagation();
      if (btn.classList.contains('added') || btn.classList.contains('oos')) return;

      var products = getProducts();
      if (products[productIdx] && products[productIdx].qty > 0) {
        products[productIdx].qty -= 1;
        localStorage.setItem('snr_products', JSON.stringify(products));

        if (products[productIdx].qty === 0) {
          btn.textContent = 'Out of Stock';
          btn.classList.add('oos');
          var card = btn.closest('.product-card');
          if (card) {
            card.classList.add('product-card--oos');
            var infoDiv = card.querySelector('.product-card__info');
            var nameEl = infoDiv && infoDiv.querySelector('.product-card__name');
            if (nameEl) {
              var row = document.createElement('div');
              row.className = 'product-card__name-row';
              row.innerHTML = '<span class="product-card__name">' + products[productIdx].name + '</span><span class="product-card__oos-label">Out of Stock</span>';
              nameEl.replaceWith(row);
            }
          }
          return;
        }
      }

      btn.textContent = '✓ Added to Cart';
      btn.classList.add('added');
      setTimeout(function() {
        btn.classList.remove('added');
        btn.textContent = 'Add to Cart';
      }, 2000);
    }

    renderGrid();
  </script>
  <script>
    (function() {
      if (localStorage.getItem('snr_loggedIn')) {
        var l=document.getElementById('headerLogin'), m=document.getElementById('accountMenu');
        if(l) l.style.display='none'; if(m) m.style.display='flex';
      }
      if (localStorage.getItem('snr_admin')) {
        var a=document.getElementById('adminLink'); if(a) a.style.display='block';
      }
      var trigger=document.getElementById('accountTrigger'), drop=document.getElementById('accountDropdown');
      if(trigger&&drop){
        trigger.addEventListener('click',function(e){e.stopPropagation();drop.classList.toggle('open');});
        document.addEventListener('click',function(){drop.classList.remove('open');});
      }
    })();
    function logout(){localStorage.removeItem('snr_loggedIn');localStorage.removeItem('snr_admin');window.location.href='index.html';}
  </script>

</body>
</html>
