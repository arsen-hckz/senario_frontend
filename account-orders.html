<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — Σenario</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --white:   #ffffff;
      --black:   #0d0d0d;
      --orange:  #C4622D;
      --gray:    #9A9A9A;
      --border:  #e8e8e4;
      --ff-display:   'Bebas Neue', sans-serif;
      --ff-condensed: 'Barlow Condensed', sans-serif;
      --ff-mono:      'DM Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    body {
      background: var(--white);
      color: var(--black);
      font-family: var(--ff-condensed);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* HEADER */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--white);
      padding: 0 40px 20px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      border-bottom: 1px solid var(--border);
    }
    .site-header__nav { display: flex; gap: 28px; padding-top: 32px; }
    .site-header__nav a {
      font-family: var(--ff-mono); font-size: 13px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--black); transition: color 0.2s;
    }
    .site-header__nav a:hover, .site-header__nav a.active { color: var(--orange); }
    .site-header__logo { width: 340px; height: auto; justify-self: center; margin-top: -24px; }
    .site-header__actions {
      display: flex; align-items: center; gap: 18px;
      justify-content: flex-end; padding-top: 32px;
    }
    .site-header__actions a {
      font-family: var(--ff-mono); font-size: 13px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--black); transition: color 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .site-header__actions a:hover { color: var(--orange); }

    /* ACCOUNT MENU */
    .account-menu { position: relative; display: flex; align-items: center; }
    .account-menu__trigger {
      background: none; border: none; cursor: pointer;
      color: var(--black); display: flex; align-items: center;
      padding: 0; transition: color 0.2s;
    }
    .account-menu__trigger:hover { color: var(--orange); }
    .account-menu__dropdown {
      position: absolute; top: calc(100% + 10px); right: 0;
      background: var(--white); border: 1px solid var(--border);
      min-width: 190px; z-index: 200;
      display: none; flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .account-menu__dropdown.open { display: flex; }
    .account-menu__dropdown a,
    .account-menu__dropdown button {
      font-family: var(--ff-mono); font-size: 9px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--black);
      padding: 13px 16px; border: none; background: none;
      text-align: left; cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
      text-decoration: none; display: block; width: 100%;
    }
    .account-menu__dropdown a:last-child,
    .account-menu__dropdown button:last-child { border-bottom: none; }
    .account-menu__dropdown a:hover,
    .account-menu__dropdown button:hover { background: var(--border); }
    .account-menu__dropdown .logout-btn { color: var(--gray); }
    .account-menu__dropdown .logout-btn:hover { color: var(--orange); background: transparent; }

    /* PAGE LAYOUT */
    .account-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    .account-title {
      font-family: var(--ff-display);
      font-size: 48px;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .account-subtitle {
      font-family: var(--ff-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 48px;
    }

    /* ORDERS */
    .order-card {
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .order-card__header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .order-card__header:hover { background: #fafafa; }
    .order-label {
      font-family: var(--ff-mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 4px;
    }
    .order-value {
      font-family: var(--ff-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--black);
    }
    .order-badge {
      display: inline-block;
      font-family: var(--ff-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 4px 10px;
      background: var(--black);
      color: var(--white);
    }
    .order-badge--delivered { background: #2d7a3c; }
    .order-badge--shipped   { background: var(--orange); }
    .order-badge--processing { background: var(--gray); }
    .order-chevron {
      font-size: 12px;
      color: var(--gray);
      transition: transform 0.2s;
    }
    .order-card.open .order-chevron { transform: rotate(180deg); }
    .order-card__body {
      display: none;
      padding: 20px 24px;
    }
    .order-card.open .order-card__body { display: block; }
    .order-item {
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .order-item:last-child { border-bottom: none; }
    .order-item__img {
      width: 60px; height: 60px;
      object-fit: cover;
      background: #f0f0f0;
    }
    .order-item__name {
      font-family: var(--ff-condensed);
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.06em;
    }
    .order-item__meta {
      font-family: var(--ff-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
      margin-top: 4px;
    }
    .order-item__price {
      font-family: var(--ff-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
    }
    .order-total {
      margin-top: 16px;
      text-align: right;
      font-family: var(--ff-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .order-total strong { color: var(--black); }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
    }
    .empty-state__icon {
      font-size: 40px;
      margin-bottom: 20px;
      opacity: 0.2;
    }
    .empty-state__text {
      font-family: var(--ff-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 24px;
    }
    .btn-ghost {
      display: inline-block;
      font-family: var(--ff-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px 28px;
      border: 1px solid var(--black);
      transition: background 0.2s, color 0.2s;
    }
    .btn-ghost:hover { background: var(--black); color: var(--white); }

    /* FOOTER */
    .site-footer {
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .footer__legal {
      font-family: var(--ff-mono); font-size: 8px;
      letter-spacing: 0.18em; color: var(--gray); text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <nav class="site-header__nav">
      <a href="collection.html">Collection</a>
      <a href="index.html">Moodboard</a>
      <a href="concept.html">Concept</a>
    </nav>
    <a href="index.html">
      <img class="site-header__logo" src="logo_combined.png" alt="Σenario">
    </a>
    <div class="site-header__actions">
      <a href="login.html" id="headerLogin"><span>Login</span></a>
      <div class="account-menu" id="accountMenu" style="display:none">
        <button class="account-menu__trigger" id="accountTrigger" aria-label="Account">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
        <div class="account-menu__dropdown" id="accountDropdown">
          <a href="account-orders.html">Orders</a>
          <a href="account-payments.html">Payment Methods</a>
          <a href="account-preferences.html">Preferences</a>
          <a href="admin.html" id="adminLink" style="display:none">Admin Dashboard</a>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
      <a href="cart.html" aria-label="Cart">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </a>
    </div>
  </header>

  <div class="account-wrap">
    <h1 class="account-title">Orders</h1>
    <p class="account-subtitle">Your order history</p>
    <div id="orderList"></div>
  </div>

  <footer class="site-footer">
    <p class="footer__legal">© 2025 Σenario — All Rights Reserved</p>
  </footer>

  <script>
    if (!localStorage.getItem('snr_loggedIn')) window.location.href = 'login.html';

    function seedOrders() {
      if (localStorage.getItem('snr_orders')) return;
      var orders = [
        {
          id: 'SNR-2025-001',
          date: '12 May 2025',
          status: 'delivered',
          items: [
            { name: 'Item 01', size: 'M', qty: 1, price: 59 },
            { name: 'Item 03', size: 'L', qty: 1, price: 89 }
          ]
        },
        {
          id: 'SNR-2025-002',
          date: '3 June 2025',
          status: 'shipped',
          items: [
            { name: 'Item 06', size: 'M', qty: 1, price: 149 }
          ]
        }
      ];
      localStorage.setItem('snr_orders', JSON.stringify(orders));
    }

    function renderOrders() {
      seedOrders();
      var orders = JSON.parse(localStorage.getItem('snr_orders') || '[]');
      var list = document.getElementById('orderList');

      if (!orders.length) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state__icon">&#9781;</div><p class="empty-state__text">No orders yet</p><a class="btn-ghost" href="collection.html">Shop the Collection</a></div>';
        return;
      }

      orders.forEach(function(order, idx) {
        var total = order.items.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
        var badgeClass = 'order-badge--' + order.status;
        var itemsHTML = order.items.map(function(item) {
          return '<div class="order-item">' +
            '<div class="order-item__img"></div>' +
            '<div><div class="order-item__name">' + item.name + '</div>' +
            '<div class="order-item__meta">Size ' + item.size + ' &nbsp;·&nbsp; Qty ' + item.qty + '</div></div>' +
            '<div class="order-item__price">€' + item.price + '</div>' +
            '</div>';
        }).join('');

        var card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML =
          '<div class="order-card__header" onclick="toggleOrder(this)">' +
            '<div><div class="order-label">Order</div><div class="order-value">' + order.id + '</div></div>' +
            '<div><div class="order-label">Date</div><div class="order-value">' + order.date + '</div></div>' +
            '<div><span class="order-badge ' + badgeClass + '">' + order.status + '</span></div>' +
            '<div class="order-chevron">▾</div>' +
          '</div>' +
          '<div class="order-card__body">' + itemsHTML +
            '<div class="order-total">Total &nbsp;<strong>€' + total + '</strong></div>' +
          '</div>';
        list.appendChild(card);
      });
    }

    function toggleOrder(header) {
      header.parentElement.classList.toggle('open');
    }

    renderOrders();

    (function() {
      if (localStorage.getItem('snr_loggedIn')) {
        var l=document.getElementById('headerLogin'), m=document.getElementById('accountMenu');
        if(l) l.style.display='none'; if(m) m.style.display='flex';
      }
      if (localStorage.getItem('snr_admin')) {
        var a=document.getElementById('adminLink'); if(a) a.style.display='block';
      }
      var trigger=document.getElementById('accountTrigger'), drop=document.getElementById('accountDropdown');
      if(trigger&&drop){
        trigger.addEventListener('click',function(e){e.stopPropagation();drop.classList.toggle('open');});
        document.addEventListener('click',function(){drop.classList.remove('open');});
      }
    })();
    function logout(){localStorage.removeItem('snr_loggedIn');localStorage.removeItem('snr_admin');window.location.href='index.html';}
  </script>

</body>
</html>
